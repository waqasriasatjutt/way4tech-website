name: Build and deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [odoo-blog-publish]
  schedule:
    # Daily at 03:00 UTC — safety-net rebuild to catch any Odoo content
    # changes missed by the publish webhook.
    - cron: '0 3 * * *'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3.80.0 pages deploy dist --project-name=way4tech-website --branch=main --commit-dirty=true
